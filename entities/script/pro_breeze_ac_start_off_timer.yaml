---
alias: Pro Breeze AC Start Off Timer

mode: single

max_exceeded: silent

sequence:
  - action: timer.start
    target:
      entity_id: timer.pro_breeze_ac_off
    data:
      duration: >-
        {% set minutes = states('input_number.pro_breeze_ac_timer_minutes') | int(120) %}
        {{ "%02d:%02d:00" | format(minutes // 60, minutes % 60) }}
