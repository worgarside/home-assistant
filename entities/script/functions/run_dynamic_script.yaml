---
description: Run a script, but the script is passed in as a literal argument

mode: parallel

fields:
  actions:
    description: A list of services/actions to run
    required: true
    example: >
      [
        {
          "service": "script.turn_on",
          "target": {
            "entity_id": "script.office_desk_{{ sit_stand }}_mode"
          },
          "data": {}
        },
        {
          "service": "persistent_notification.create",
          "target": {},
          "data": {
            "title": "{{ sit_stand.title() }} mode activated",
            "message": "The office desk is now in {{ sit_stand }} mode",
          }
        }
      ]

  script_id:
    description: The name of the script to run (for debugging/notifications)
    required: false

  variable_dict:
    description: A dictionary of variables to use in the script
    required: false
    example: >
      {
        "sit_stand": "sitting"
      }

sequence:
  - variables: >-
      {{ variable_dict | default({}) | tojson }}

  - repeat:
      for_each: "{{ actions }}"

      sequence:
        - service: script.turn_on
          target:
            entity_id: script.debug_persistent_notification
          data:
            variables:
              title: >-
                Running Action #{{ repeat.index }} in dynamic script {{ script_id | default('') }}

              message: |
                ```json
                {{ repeat | tojson(indent=2) }}
                ```

        - service: "{{ repeat.item.service }}"
          target: "{{ repeat.item.target | default({}) }}"
          data: "{{ repeat.item.data | default({}) }}"
