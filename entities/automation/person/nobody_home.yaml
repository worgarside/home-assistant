---
alias: /person/nobody-home

id: person_nobody_home

mode: restart

description: Turn off all physical devices when nobody is home

trigger:
  - platform: state
    entity_id: zone.home
    to: "0"

action:
  - action: switch.turn_off
    continue_on_error: true
    target:
      entity_id: switch.central_heating

  - action: climate.turn_off
    continue_on_error: true
    target:
      label_id: radiator

  - action: switch.turn_off
    continue_on_error: true
    target:
      entity_id: switch.lounge_christmas_tree

  - alias: "Turn off each physical room"
    repeat:
      for_each:
        - dining_area
        - kitchen
        - lower_hallway
        - front_hallway
        - lounge
        - vic_s_office
        - bathroom
        - bedroom
        - landing
        - will_s_office
        - guest_room
        - roof_terrace
      sequence:
        - action: script.turn_off_physical_room
          data:
            room: "{{ repeat.item }}"
          continue_on_error: true
