---
alias: /input-boolean/air-purifier-quiet-mode/toggle

id: input_boolean_air_purifier_quiet_mode_toggle

mode: single

max_exceeded: silent

trigger:
  - trigger: state
    entity_id: remote.lounge_streamer
    to:
      - "on"
      - "off"

  - trigger: state
    entity_id: remote.dining_area_chromecast_remote
    to:
      - "on"
      - "off"

  - trigger: state
    entity_id: input_select.air_purifier_quiet_mode_source
    to:
      - Lounge Streamer
      - Dining Area Chromecast

variables:
  quiet_mode_should_be_on: >
    {{
      (
        is_state('input_select.air_purifier_quiet_mode_source', 'Lounge Streamer') and
        is_state('remote.lounge_streamer', 'on')
      ) or (
        is_state('input_select.air_purifier_quiet_mode_source', 'Dining Area Chromecast') and
        is_state('remote.dining_area_chromecast_remote', 'on')
      )
    }}

action:
  - action: input_boolean.turn_{{ 'on' if quiet_mode_should_be_on else 'off' }}
    target:
      entity_id: input_boolean.air_purifier_quiet_mode
