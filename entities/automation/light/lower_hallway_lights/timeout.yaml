---
alias: /light/lower-hallway-lights/timeout

id: light_lower_hallway_lights_timeout

mode: single

max_exceeded: silent

trigger:
  - platform: state
    entity_id: binary_sensor.lower_hallway_occupancy
    from: "on"
    to: "off"

  - platform: state
    entity_id: binary_sensor.main_hallway_motion_sensor_occupancy
    from: "on"
    to: "off"

  - platform: state
    entity_id: binary_sensor.kitchen_hallway_occupancy
    from: "on"
    to: "off"

condition:
  # Only proceed if no motion sensors are on (unavailable counts as not on)
  - condition: not
    conditions:
      - condition: or
        conditions:
          - condition: state
            entity_id: binary_sensor.lower_hallway_occupancy
            state: "on"
          - condition: state
            entity_id: binary_sensor.main_hallway_motion_sensor_occupancy
            state: "on"
          - condition: state
            entity_id: binary_sensor.kitchen_hallway_occupancy
            state: "on"

action:
  # Wait for the configured timeout period
  - delay:
      seconds: "{{ states('input_number.hallway_lights_timeout') | int(120) }}"

  # Check again that no sensors are on after the timeout
  - condition: not
    conditions:
      - condition: or
        conditions:
          - condition: state
            entity_id: binary_sensor.lower_hallway_occupancy
            state: "on"
          - condition: state
            entity_id: binary_sensor.main_hallway_motion_sensor_occupancy
            state: "on"
          - condition: state
            entity_id: binary_sensor.kitchen_hallway_occupancy
            state: "on"

  - parallel:
      - action: light.turn_off
        entity_id: light.lower_hallway_1
        data:
          transition: 5

      - action: light.turn_off
        entity_id: light.lower_hallway_2
        data:
          transition: 5

      - action: light.turn_off
        entity_id: light.kitchen_hallway_spotlight
        data:
          transition: 5
