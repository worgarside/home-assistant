---
alias: /cosmo/nightly-kitchen-clean

id: cosmo_nightly_kitchen_clean

mode: single

max_exceeded: silent

trigger:
  platform: time
  at: input_datetime.cosmo_nightly_kitchen_clean_time

action:
  - if: "{{ states('binary_sensor.basement_occupancy') | bool(false) }}"

    then:
      - alias: Wait for nobody in the kitchen
        wait_for_trigger:
          - platform: state
            entity_id: binary_sensor.basement_occupancy
            to: "off"
            for:
              minutes: 10

  - if: "{{ is_state('binary_sensor.kitchen_door_door', 'on') }}"

    then:
      - variables:
          door_timeout_minutes: >-
            {{ states('input_number.cosmo_nightly_kitchen_clean_door_close_timeout') | int(60) }}

      - alias: Notify Will that the kitchen door is open
        action: script.notify_will
        data:
          title: Kitchen Door Open
          message: >-
            The kitchen door is open! Cosmo will start once it's closed, or skip ahead with the
            button below.
          notification_id: cosmo_nightly_kitchen_clean_door_open
          mobile_notification_icon: mdi:door-open
          timeout: "{{ door_timeout_minutes * 60 }}"
          actions:
            - action: COSMO_KITCHEN_CLEAN_ANYWAY
              title: Clean Anyway

      - alias: Wait for the door to close or for manual override
        wait_for_trigger:
          - platform: state
            entity_id: binary_sensor.kitchen_door_door
            to: "off"
          - platform: event
            event_type: mobile_app_notification_action
            event_data:
              action: COSMO_KITCHEN_CLEAN_ANYWAY
        timeout:
          minutes: "{{ door_timeout_minutes }}"
        continue_on_timeout: true

      - alias: Clear the door open notification
        action: script.notify_will
        data:
          clear_notification: true
          notification_id: cosmo_nightly_kitchen_clean_door_open

      - if: "{{ not wait.completed }}"

        then:
          - stop: Kitchen door was not closed within the timeout, skipping clean

  - action: script.cosmo_clean_room
    data:
      room_name: Basement
      suction_level: "{{ states('input_number.nightly_kitchen_clean_suction_level') | int(2) }}"
